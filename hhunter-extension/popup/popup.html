<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>HHunter</title>
  </head>
  <body>
    <div class="wrap">
      <div class="title">HHunter</div>
      <p class="hint">Только JWT, без слова Bearer. Или «Токен с сайта».</p>
      <div class="row">
        <label>API base</label>
        <input id="apiBase" placeholder="http://localhost:8000" />
      </div>
      <div class="row">
        <label>JWT token</label>
        <input id="token" placeholder="eyJ…" />
      </div>
      <div class="row">
        <label></label>
        <button type="button" id="btnPullToken" class="btn-secondary">Токен с сайта</button>
      </div>
      <div class="row">
        <label>Сайт HeadHunter</label>
        <select id="hhOrigin" title="Полный цикл открывает поиск и вакансии на этом домене; активная вкладка — тот же домен.">
          <option value="https://hh.ru">Россия — hh.ru</option>
          <option value="https://tashkent.hh.uz">Ташкент — tashkent.hh.uz</option>
          <option value="https://hh.uz">Узбекистан — hh.uz</option>
          <option value="https://hh.kz">Казахстан — hh.kz</option>
        </select>
      </div>
      <div class="row">
        <label></label>
        <label class="check"><input type="checkbox" id="fullAuto" /> Полный цикл: поиск → вакансии → отклик</label>
      </div>
      <div class="row buttons">
        <button id="btnSave">Сохранить</button>
        <button id="btnToggle">Запустить</button>
      </div>

      <div class="box">
        <div id="modelLine" class="muted">—</div>
        <div id="statsLine" class="muted">—</div>
        <div id="lastLine" class="muted">—</div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
